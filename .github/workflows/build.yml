name: Build installers

# Builds the Windows .exe and macOS .dmg and publishes them to a GitHub Release
# so the app can auto-update. Run manually from the Actions tab ("Run workflow")
# after bumping the version in package.json, or push a version tag like v0.1.1.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to create/update the GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: publish:win
          - os: macos-latest
            script: publish:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Package & publish
        run: npm run ${{ matrix.script }}
        env:
          # Publish the release so auto-update works.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Don't try to sign/notarize the macOS build (no Apple certs here).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installers (also as workflow artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: doneline-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
          if-no-files-found: ignore
