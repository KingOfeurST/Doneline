name: Build installers

# Builds the Windows .exe and the macOS .dmg. Run it manually from the Actions
# tab ("Run workflow"), or push a version tag like v0.1.0.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Package
        run: npm run ${{ matrix.script }}
        env:
          # Don't try to sign/notarize the macOS build (no Apple certs here).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: doneline-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
          if-no-files-found: ignore
